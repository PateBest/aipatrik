name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Check for GitHub Secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "Error: SUPABASE_URL secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Error: SUPABASE_ANON_KEY secret is missing."
            exit 1
          fi
          
          echo "GitHub Secrets found and validated."
          # Emme voi tulostaa secretien pituutta suoraan, koska ne eivät ole saatavilla shell-ympäristössä
          echo "Secrets are available and will be used in the next steps."

      - name: Create config.runtime.js
        run: |
          # Create js directory if it doesn't exist
          mkdir -p js
          
          # Create config.runtime.js with Supabase configuration
          cat > js/config.runtime.js << EOF
          // This file is generated during deployment - do not edit manually
          window.SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";
          window.SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}";
          
          // Make configuration available through CONFIG object for compatibility
          if (typeof window.CONFIG === 'undefined') {
            window.CONFIG = {};
          }
          window.CONFIG.SUPABASE_URL = window.SUPABASE_URL;
          window.CONFIG.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
          
          // Make configuration available through INLINE_CONFIG object for compatibility
          window.INLINE_CONFIG = {
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          };
          
          console.log("Supabase configuration loaded from config.runtime.js");
          EOF
          
          echo "Created config.runtime.js with Supabase configuration"
          
          # Create copies in multiple locations for better accessibility
          mkdir -p pages/js
          cp js/config.runtime.js pages/js/config.runtime.js
          echo "Created copy of config.runtime.js in pages/js directory"
          
          # Copy to root directory
          cp js/config.runtime.js ./config.runtime.js
          echo "Created copy of config.runtime.js in root directory"
          
          # Copy to pages directory
          cp js/config.runtime.js ./pages/config.runtime.js
          echo "Created copy of config.runtime.js in pages directory"

      - name: Create and replace Supabase config
        run: |
          # Luodaan JavaScript-tiedosto, joka sisältää Supabase-konfiguraation
          SUPABASE_CONFIG="window.SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';\nwindow.SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';\nwindow.INLINE_CONFIG = {\n  SUPABASE_URL: '${{ secrets.SUPABASE_URL }}',\n  SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}'\n};\nconsole.log(\"Inline Supabase configuration loaded\");"
          
          # Tulostetaan debug-tietoa (ei näytä secretien arvoja)
          echo "Replacing placeholder with Supabase configuration"
          echo "SUPABASE_URL length: ${#SUPABASE_URL}"
          echo "SUPABASE_ANON_KEY length: ${#SUPABASE_ANON_KEY}"
          
          # Käytetään perl-komentoa korvaamaan placeholder
          # Perl on luotettavampi monirivisten korvausten käsittelyssä
          perl -i -pe "s|// SUPABASE_CONFIG_PLACEHOLDER|$SUPABASE_CONFIG|g" pages/yhteystiedot.html
          
          # Varmistetaan, että korvaus onnistui
          if grep -q "window.SUPABASE_URL" pages/yhteystiedot.html; then
            echo "Placeholder successfully replaced with Supabase configuration"
          else
            echo "Failed to replace placeholder with Supabase configuration"
            echo "Trying alternative method..."
            
            # Vaihtoehtoinen tapa: luodaan uusi tiedosto ja korvataan vanha
            cp pages/yhteystiedot.html pages/yhteystiedot.html.bak
            cat pages/yhteystiedot.html.bak | sed "s|// SUPABASE_CONFIG_PLACEHOLDER|$SUPABASE_CONFIG|g" > pages/yhteystiedot.html
            rm pages/yhteystiedot.html.bak
            
            # Tarkistetaan uudelleen
            if grep -q "window.SUPABASE_URL" pages/yhteystiedot.html; then
              echo "Alternative method successful"
            else
              echo "Both methods failed. Manual inspection needed."
              exit 1
            fi
          fi

          # Luodaan .nojekyll-tiedosto estämään GitHub Pagesin Jekyll-käsittely
          touch .nojekyll
          echo "Created .nojekyll file"
          
          # Luodaan suora JavaScript-tiedosto pages-hakemistoon
          echo "Creating direct JavaScript file with Supabase configuration"
          mkdir -p pages/js
          
          # Luodaan supabase-config.js-tiedosto
          cat > pages/js/supabase-config.js << EOF
          // This file is generated during deployment - do not edit manually
          window.SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";
          window.SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}";
          
          // Make configuration available through CONFIG object for compatibility
          if (typeof window.CONFIG === 'undefined') {
            window.CONFIG = {};
          }
          window.CONFIG.SUPABASE_URL = window.SUPABASE_URL;
          window.CONFIG.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
          
          // Make configuration available through INLINE_CONFIG object for compatibility
          window.INLINE_CONFIG = {
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          };
          
          console.log("Supabase configuration loaded from supabase-config.js");
          EOF
          
          echo "Created supabase-config.js with Supabase configuration"
          
          # Kopioidaan tiedosto myös juurihakemistoon ja muihin hakemistoihin
          cp pages/js/supabase-config.js ./supabase-config.js
          cp pages/js/supabase-config.js ./pages/supabase-config.js
          cp pages/js/supabase-config.js ./js/supabase-config.js
          
          echo "Copied supabase-config.js to multiple locations for better accessibility"
          
          # Lisätään script-tagi yhteystiedot.html-tiedostoon
          echo "Adding script tag to yhteystiedot.html"
          
          # Etsitään sopiva kohta (head-tagin loppu) ja lisätään script-tagi
          perl -i -pe 's|</head>|    <script src="../js/supabase-config.js"></script>\n    <script src="./js/supabase-config.js"></script>\n    <script src="/js/supabase-config.js"></script>\n    <script src="/aipatrik/js/supabase-config.js"></script>\n</head>|g' pages/yhteystiedot.html
          
          echo "Added script tags to yhteystiedot.html"

      - name: Create direct configuration page
        run: |
          # Create a direct configuration page for easy debugging
          mkdir -p debug
          cat > debug/config-status.html << EOF
          <!DOCTYPE html>
          <html lang="fi">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Supabase Configuration Status</title>
              <style>
                  body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; }
                  .container { max-width: 800px; margin: 0 auto; background-color: #1e1e1e; padding: 20px; border-radius: 8px; }
                  h1 { color: #00e6b8; }
                  .status-box { background-color: #2a2a2a; padding: 15px; border-radius: 5px; margin: 15px 0; }
                  .success { color: #00e6b8; }
                  .error { color: #ff5555; }
                  pre { background-color: #2a2a2a; padding: 10px; border-radius: 5px; overflow-x: auto; }
                  .back-link { color: #00e6b8; text-decoration: none; display: inline-block; margin-top: 20px; }
                  .back-link:hover { text-decoration: underline; }
              </style>
              
              <!-- Supabase JavaScript-kirjasto -->
              <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
              
              <!-- Suora konfiguraatio -->
              <script>
              window.SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';
              window.SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_ANON_KEY }}';
              window.INLINE_CONFIG = {
                  SUPABASE_URL: '${{ secrets.SUPABASE_URL }}',
                  SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}'
              };
              if (typeof window.CONFIG === 'undefined') {
                  window.CONFIG = {};
              }
              window.CONFIG.SUPABASE_URL = window.SUPABASE_URL;
              window.CONFIG.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
              console.log('Direct configuration loaded in debug page');
              </script>
          </head>
          <body>
              <div class="container">
                  <h1>Supabase Configuration Status</h1>
                  
                  <div class="status-box">
                      <h2>Configuration Check</h2>
                      <p>This page checks if Supabase configuration is properly loaded.</p>
                      <p>If you see "Configuration is missing" below, it means the GitHub Secrets are not properly set up or the configuration is not being loaded correctly.</p>
                  </div>
                  
                  <div class="status-box">
                      <h2>Window Object Check</h2>
                      <div id="window-status">Checking...</div>
                  </div>
                  
                  <div class="status-box">
                      <h2>CONFIG Object Check</h2>
                      <div id="config-status">Checking...</div>
                  </div>
                  
                  <div class="status-box">
                      <h2>INLINE_CONFIG Object Check</h2>
                      <div id="inline-config-status">Checking...</div>
                  </div>
                  
                  <div class="status-box">
                      <h2>Supabase Connection Test</h2>
                      <div id="connection-test">Checking...</div>
                  </div>
                  
                  <a href="../pages/yhteystiedot.html" class="back-link">← Back to Contact Form</a>
              </div>
              
              <script>
                  // Check configuration after a short delay
                  setTimeout(() => {
                      // Check window object
                      const windowStatus = document.getElementById('window-status');
                      if (window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
                          windowStatus.innerHTML = '<span class="success">✓ Window object contains Supabase configuration</span>';
                      } else {
                          windowStatus.innerHTML = '<span class="error">✗ Window object is missing Supabase configuration</span>';
                      }
                      
                      // Check CONFIG object
                      const configStatus = document.getElementById('config-status');
                      if (window.CONFIG && window.CONFIG.SUPABASE_URL && window.CONFIG.SUPABASE_ANON_KEY) {
                          configStatus.innerHTML = '<span class="success">✓ CONFIG object contains Supabase configuration</span>';
                      } else {
                          configStatus.innerHTML = '<span class="error">✗ CONFIG object is missing Supabase configuration</span>';
                      }
                      
                      // Check INLINE_CONFIG object
                      const inlineConfigStatus = document.getElementById('inline-config-status');
                      if (window.INLINE_CONFIG && window.INLINE_CONFIG.SUPABASE_URL && window.INLINE_CONFIG.SUPABASE_ANON_KEY) {
                          inlineConfigStatus.innerHTML = '<span class="success">✓ INLINE_CONFIG object contains Supabase configuration</span>';
                      } else {
                          inlineConfigStatus.innerHTML = '<span class="error">✗ INLINE_CONFIG object is missing Supabase configuration</span>';
                      }
                      
                      // Test Supabase connection
                      const connectionTest = document.getElementById('connection-test');
                      try {
                          if (window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
                              const client = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
                              connectionTest.innerHTML = '<span class="success">✓ Supabase client created successfully</span>';
                              
                              // Try to make a simple query
                              client.from('contact_messages').select('count', { count: 'exact', head: true })
                                  .then(response => {
                                      if (response.error) {
                                          connectionTest.innerHTML = '<span class="error">✗ Error connecting to Supabase: ' + response.error.message + '</span>';
                                      } else {
                                          connectionTest.innerHTML = '<span class="success">✓ Successfully connected to Supabase database</span>';
                                      }
                                  })
                                  .catch(error => {
                                      connectionTest.innerHTML = '<span class="error">✗ Error connecting to Supabase: ' + error.message + '</span>';
                                  });
                          } else {
                              connectionTest.innerHTML = '<span class="error">✗ Cannot test connection: Supabase configuration is missing</span>';
                          }
                      } catch (error) {
                          connectionTest.innerHTML = '<span class="error">✗ Error creating Supabase client: ' + error.message + '</span>';
                      }
                  }, 500);
              </script>
          </body>
          </html>
          EOF
          
          echo "Created debug/config-status.html for configuration debugging"

      - name: Verify changes
        run: |
          # Verify config.runtime.js exists and contains Supabase configuration
          if [ -f "./js/config.runtime.js" ]; then
            if grep -q "window.SUPABASE_URL" ./js/config.runtime.js; then
              echo "Supabase config successfully added to config.runtime.js"
            else
              echo "Failed to add Supabase config to config.runtime.js"
              exit 1
            fi
          else
            echo "config.runtime.js not found"
            exit 1
          fi
          
          # Verify yhteystiedot.html
          if grep -q "window.SUPABASE_URL" ./pages/yhteystiedot.html; then
            echo "Supabase config successfully added to yhteystiedot.html"
          else
            echo "Failed to add Supabase config to yhteystiedot.html"
            exit 1
          fi
          
          # Verify supabase-config.js exists and contains Supabase configuration
          if [ -f "./js/supabase-config.js" ]; then
            if grep -q "window.SUPABASE_URL" ./js/supabase-config.js; then
              echo "Supabase config successfully added to js/supabase-config.js"
            else
              echo "Failed to add Supabase config to js/supabase-config.js"
              exit 1
            fi
          else
            echo "js/supabase-config.js not found"
            exit 1
          fi
          
          # Verify script tags in yhteystiedot.html
          if grep -q "supabase-config.js" ./pages/yhteystiedot.html; then
            echo "Script tags successfully added to yhteystiedot.html"
          else
            echo "Failed to add script tags to yhteystiedot.html"
            exit 1
          fi
          
          # Verify root config.runtime.js
          if [ -f "./config.runtime.js" ]; then
            echo "Root config.runtime.js exists"
          else
            echo "Root config.runtime.js not found"
            exit 1
          fi
          
          # Verify pages/config.runtime.js
          if [ -f "./pages/config.runtime.js" ]; then
            echo "Pages config.runtime.js exists"
          else
            echo "Pages config.runtime.js not found"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }} 