name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create runtime config
        run: |
          echo "// Auto-generated by GitHub Actions - $(date)" > ./config.runtime.js
          echo "window.CONFIG = {" >> ./config.runtime.js
          echo "  SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'," >> ./config.runtime.js
          echo "  SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}'" >> ./config.runtime.js
          echo "};" >> ./config.runtime.js
          # Varmistetaan, että config.runtime.js on juurihakemistossa
          cp ./config.runtime.js ./config.runtime.js.bak
          
      - name: Verify config file
        run: |
          echo "Verifying config.runtime.js exists"
          if [ -f "./config.runtime.js" ]; then
            echo "Config file created successfully"
            ls -la ./config.runtime.js
          else
            echo "Config file creation failed"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false 