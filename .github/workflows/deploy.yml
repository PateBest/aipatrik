name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Create runtime config
        run: |
          # Luodaan config.runtime.js-tiedosto
          echo "// Auto-generated by GitHub Actions - $(date)" > ./config.runtime.js
          echo "window.CONFIG = {" >> ./config.runtime.js
          echo "  SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'," >> ./config.runtime.js
          echo "  SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}'" >> ./config.runtime.js
          echo "};" >> ./config.runtime.js
          
          # Kopioidaan tiedosto useisiin paikkoihin
          cp ./config.runtime.js ./js/config.runtime.js
          cp ./config.runtime.js ./pages/config.runtime.js
          
          # Luodaan inline-konfiguraatio
          INLINE_CONFIG="<script>window.INLINE_CONFIG = { SUPABASE_URL: '${{ secrets.SUPABASE_URL }}', SUPABASE_ANON_KEY: '${{ secrets.SUPABASE_ANON_KEY }}' };</script>"
          
          # Korvataan placeholder yhteystiedot.html-sivulla
          if [ -f "./pages/yhteystiedot.html" ]; then
            sed -i "s|<!-- SUPABASE_CONFIG_PLACEHOLDER -->|$INLINE_CONFIG|" ./pages/yhteystiedot.html
            echo "Inline-konfiguraatio lisätty yhteystiedot.html-sivulle"
          else
            echo "yhteystiedot.html-tiedostoa ei löytynyt"
          fi
          
          # Korvataan placeholder myös testisivulla
          if [ -f "./pages/test-contact-form.html" ]; then
            sed -i "s|<!-- SUPABASE_CONFIG_PLACEHOLDER -->|$INLINE_CONFIG|" ./pages/test-contact-form.html
            echo "Inline-konfiguraatio lisätty test-contact-form.html-sivulle"
          else
            echo "test-contact-form.html-tiedostoa ei löytynyt"
          fi
          
      - name: Verify config files
        run: |
          echo "Verifying config.runtime.js exists in multiple locations"
          if [ -f "./config.runtime.js" ]; then
            echo "Root config file created successfully"
            ls -la ./config.runtime.js
          else
            echo "Root config file creation failed"
            exit 1
          fi
          
          if [ -f "./js/config.runtime.js" ]; then
            echo "JS directory config file created successfully"
          else
            echo "JS directory config file creation failed"
          fi
          
          if [ -f "./pages/config.runtime.js" ]; then
            echo "Pages directory config file created successfully"
          else
            echo "Pages directory config file creation failed"
          fi
          
          # Tarkistetaan, että inline-konfiguraatio on lisätty
          if [ -f "./pages/yhteystiedot.html" ]; then
            if grep -q "window.INLINE_CONFIG" ./pages/yhteystiedot.html; then
              echo "Inline configuration added to yhteystiedot.html"
            else
              echo "Failed to add inline configuration to yhteystiedot.html"
            fi
          fi
          
          # Tarkistetaan, että inline-konfiguraatio on lisätty testisivulle
          if [ -f "./pages/test-contact-form.html" ]; then
            if grep -q "window.INLINE_CONFIG" ./pages/test-contact-form.html; then
              echo "Inline configuration added to test-contact-form.html"
            else
              echo "Failed to add inline configuration to test-contact-form.html"
            fi
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }} 