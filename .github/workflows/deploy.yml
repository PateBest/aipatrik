name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Check GitHub Secrets
        run: |
          echo "Tarkistetaan GitHub Secretsien olemassaolo..."
          
          # Tarkistetaan SUPABASE_URL
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "VAROITUS: SUPABASE_URL secret puuttuu tai on tyhjä!"
            SUPABASE_URL_EXISTS="false"
          else
            echo "SUPABASE_URL secret löytyy"
            SUPABASE_URL_EXISTS="true"
          fi
          
          # Tarkistetaan SUPABASE_ANON_KEY
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "VAROITUS: SUPABASE_ANON_KEY secret puuttuu tai on tyhjä!"
            SUPABASE_ANON_KEY_EXISTS="false"
          else
            echo "SUPABASE_ANON_KEY secret löytyy"
            SUPABASE_ANON_KEY_EXISTS="true"
          fi
          
          # Luodaan fallback-arvot, jos secretit puuttuvat
          if [ "$SUPABASE_URL_EXISTS" = "false" ] || [ "$SUPABASE_ANON_KEY_EXISTS" = "false" ]; then
            echo "Käytetään fallback-arvoja puuttuvien secretien tilalla"
            echo "SUPABASE_URL_FALLBACK=https://example.supabase.co" >> $GITHUB_ENV
            echo "SUPABASE_ANON_KEY_FALLBACK=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4YW1wbGUiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTYxNjQyMjU4MCwiZXhwIjoxOTMyMDAwMDAwfQ.fallback-key-for-testing" >> $GITHUB_ENV
          fi

      - name: Create runtime config
        run: |
          # Käytetään secretejä tai fallback-arvoja
          SUPABASE_URL="${{ secrets.SUPABASE_URL || env.SUPABASE_URL_FALLBACK }}"
          SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY || env.SUPABASE_ANON_KEY_FALLBACK }}"
          
          echo "Käytetään seuraavia arvoja:"
          echo "SUPABASE_URL: ${SUPABASE_URL:0:10}... (ensimmäiset 10 merkkiä)"
          echo "SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:0:10}... (ensimmäiset 10 merkkiä)"
          
          # Luodaan config.runtime.js-tiedosto
          echo "// Auto-generated by GitHub Actions - $(date)" > ./config.runtime.js
          echo "window.CONFIG = {" >> ./config.runtime.js
          echo "  SUPABASE_URL: '${SUPABASE_URL}'," >> ./config.runtime.js
          echo "  SUPABASE_ANON_KEY: '${SUPABASE_ANON_KEY}'" >> ./config.runtime.js
          echo "};" >> ./config.runtime.js
          
          # Kopioidaan tiedosto useisiin paikkoihin
          cp ./config.runtime.js ./js/config.runtime.js
          cp ./config.runtime.js ./pages/config.runtime.js
          
          # Luodaan inline-konfiguraatio
          INLINE_CONFIG="<script>window.INLINE_CONFIG = { SUPABASE_URL: '${SUPABASE_URL}', SUPABASE_ANON_KEY: '${SUPABASE_ANON_KEY}' };</script>"
          
          # Korvataan placeholder yhteystiedot.html-sivulla
          if [ -f "./pages/yhteystiedot.html" ]; then
            sed -i "s|<!-- SUPABASE_CONFIG_PLACEHOLDER -->|$INLINE_CONFIG|" ./pages/yhteystiedot.html
            echo "Inline-konfiguraatio lisätty yhteystiedot.html-sivulle"
          else
            echo "yhteystiedot.html-tiedostoa ei löytynyt"
          fi
          
          # Korvataan placeholder myös testisivulla - UUSI TAPA
          if [ -f "./pages/test-contact-form.html" ]; then
            # Luodaan väliaikainen tiedosto
            cp ./pages/test-contact-form.html ./pages/test-contact-form.html.temp
            
            # Lisätään konfiguraatio suoraan head-osioon
            awk -v supabase_url="${SUPABASE_URL}" -v supabase_anon_key="${SUPABASE_ANON_KEY}" '
            /<head>/ {
              print $0;
              print "    <!-- Supabase-konfiguraatio (lisätty GitHub Actionsin toimesta) -->";
              print "    <script>";
              print "    window.INLINE_CONFIG = {";
              print "      SUPABASE_URL: \"" supabase_url "\",";
              print "      SUPABASE_ANON_KEY: \"" supabase_anon_key "\"";
              print "    };";
              print "    </script>";
              next;
            }
            { print $0 }
            ' ./pages/test-contact-form.html.temp > ./pages/test-contact-form.html
            
            # Poistetaan väliaikainen tiedosto
            rm ./pages/test-contact-form.html.temp
            
            echo "Inline-konfiguraatio lisätty test-contact-form.html-sivulle (uusi tapa)"
          else
            echo "test-contact-form.html-tiedostoa ei löytynyt"
          fi
          
          # Luodaan erillinen supabase-config.js tiedosto testisivua varten
          echo "// Supabase-konfiguraatio testisivua varten - $(date)" > ./js/supabase-config.js
          echo "console.log('Supabase-konfiguraatio ladattu erillisestä tiedostosta');" >> ./js/supabase-config.js
          echo "window.SUPABASE_CONFIG = {" >> ./js/supabase-config.js
          echo "  SUPABASE_URL: '${SUPABASE_URL}'," >> ./js/supabase-config.js
          echo "  SUPABASE_ANON_KEY: '${SUPABASE_ANON_KEY}'" >> ./js/supabase-config.js
          echo "};" >> ./js/supabase-config.js
          echo "// Asetetaan myös window.CONFIG ja window.INLINE_CONFIG varmuuden vuoksi" >> ./js/supabase-config.js
          echo "window.CONFIG = window.CONFIG || window.SUPABASE_CONFIG;" >> ./js/supabase-config.js
          echo "window.INLINE_CONFIG = window.INLINE_CONFIG || window.SUPABASE_CONFIG;" >> ./js/supabase-config.js
          
          # Lisätään supabase-config.js tiedoston lataus testisivulle
          if [ -f "./pages/test-contact-form.html" ]; then
            sed -i '/<script src="..\/js\/test-config.js"><\/script>/i \    <!-- Erillinen Supabase-konfiguraatio -->\n    <script src="../js/supabase-config.js"></script>' ./pages/test-contact-form.html
            echo "Erillisen Supabase-konfiguraatiotiedoston lataus lisätty test-contact-form.html-sivulle"
          fi
          
          # TÄYSIN UUSI TAPA: Luodaan direct-config.js tiedosto, joka sisältää konfiguraation suoraan
          mkdir -p ./direct-config
          echo "// Suora konfiguraatio - $(date)" > ./direct-config/config.js
          echo "console.log('Suora konfiguraatio ladattu');" >> ./direct-config/config.js
          echo "window.DIRECT_CONFIG = {" >> ./direct-config/config.js
          echo "  SUPABASE_URL: '${SUPABASE_URL}'," >> ./direct-config/config.js
          echo "  SUPABASE_ANON_KEY: '${SUPABASE_ANON_KEY}'" >> ./direct-config/config.js
          echo "};" >> ./direct-config/config.js
          echo "// Asetetaan kaikki mahdolliset konfiguraatiomuuttujat" >> ./direct-config/config.js
          echo "window.CONFIG = window.DIRECT_CONFIG;" >> ./direct-config/config.js
          echo "window.INLINE_CONFIG = window.DIRECT_CONFIG;" >> ./direct-config/config.js
          echo "window.SUPABASE_CONFIG = window.DIRECT_CONFIG;" >> ./direct-config/config.js
          
          # Luodaan yksinkertainen HTML-tiedosto, joka lataa konfiguraation
          echo "<!DOCTYPE html>" > ./direct-config/index.html
          echo "<html><head>" >> ./direct-config/index.html
          echo "<title>Supabase Config</title>" >> ./direct-config/index.html
          echo "<script src=\"config.js\"></script>" >> ./direct-config/index.html
          echo "</head><body>" >> ./direct-config/index.html
          echo "<h1>Supabase Config</h1>" >> ./direct-config/index.html
          echo "<p>Tämä sivu sisältää Supabase-konfiguraation.</p>" >> ./direct-config/index.html
          echo "<script>" >> ./direct-config/index.html
          echo "document.write('<pre>' + JSON.stringify(window.DIRECT_CONFIG, null, 2) + '</pre>');" >> ./direct-config/index.html
          echo "</script>" >> ./direct-config/index.html
          echo "</body></html>" >> ./direct-config/index.html
          
          # Lisätään direct-config.js tiedoston lataus testisivulle
          if [ -f "./pages/test-contact-form.html" ]; then
            sed -i '/<script src="..\/js\/supabase-config.js"><\/script>/i \    <!-- Suora konfiguraatio -->\n    <script src="../direct-config/config.js"></script>' ./pages/test-contact-form.html
            echo "Suoran konfiguraatiotiedoston lataus lisätty test-contact-form.html-sivulle"
            
            # Lisätään myös linkki suoraan konfiguraatiosivulle
            sed -i '/<div class="action-buttons">/a \            <button class="action-button" onclick="window.open('\''../direct-config/index.html'\'', '\''_blank'\'')">\n                <i class="fas fa-cog"></i> Avaa suora konfiguraatiosivu\n            </button>' ./pages/test-contact-form.html
            echo "Linkki suoraan konfiguraatiosivulle lisätty test-contact-form.html-sivulle"
          fi
          
          # Luodaan myös testisivu, joka näyttää GitHub Secretsien tilan
          echo "<!DOCTYPE html>" > ./direct-config/secrets-status.html
          echo "<html><head>" >> ./direct-config/secrets-status.html
          echo "<title>GitHub Secrets Status</title>" >> ./direct-config/secrets-status.html
          echo "<style>body{font-family:sans-serif;max-width:800px;margin:0 auto;padding:20px;} .status{padding:10px;margin:10px 0;border-radius:5px;} .success{background-color:#d4edda;color:#155724;} .error{background-color:#f8d7da;color:#721c24;}</style>" >> ./direct-config/secrets-status.html
          echo "</head><body>" >> ./direct-config/secrets-status.html
          echo "<h1>GitHub Secrets Status</h1>" >> ./direct-config/secrets-status.html
          echo "<p>Tämä sivu näyttää GitHub Secretsien tilan.</p>" >> ./direct-config/secrets-status.html
          
          # Tarkistetaan SUPABASE_URL
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "<div class='status error'><strong>SUPABASE_URL:</strong> Puuttuu tai on tyhjä!</div>" >> ./direct-config/secrets-status.html
          else
            echo "<div class='status success'><strong>SUPABASE_URL:</strong> Määritelty (alkaa: ${SUPABASE_URL:0:10}...)</div>" >> ./direct-config/secrets-status.html
          fi
          
          # Tarkistetaan SUPABASE_ANON_KEY
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "<div class='status error'><strong>SUPABASE_ANON_KEY:</strong> Puuttuu tai on tyhjä!</div>" >> ./direct-config/secrets-status.html
          else
            echo "<div class='status success'><strong>SUPABASE_ANON_KEY:</strong> Määritelty (alkaa: ${SUPABASE_ANON_KEY:0:10}...)</div>" >> ./direct-config/secrets-status.html
          fi
          
          echo "<h2>Ohjeet</h2>" >> ./direct-config/secrets-status.html
          echo "<p>Jos GitHub Secrets puuttuvat, seuraa näitä ohjeita:</p>" >> ./direct-config/secrets-status.html
          echo "<ol>" >> ./direct-config/secrets-status.html
          echo "<li>Mene GitHub-repositoriosi asetuksiin</li>" >> ./direct-config/secrets-status.html
          echo "<li>Valitse vasemmasta sivupalkista 'Secrets and variables' ja sitten 'Actions'</li>" >> ./direct-config/secrets-status.html
          echo "<li>Klikkaa 'New repository secret' -painiketta</li>" >> ./direct-config/secrets-status.html
          echo "<li>Lisää SUPABASE_URL ja SUPABASE_ANON_KEY secretit Supabase-projektistasi</li>" >> ./direct-config/secrets-status.html
          echo "</ol>" >> ./direct-config/secrets-status.html
          
          echo "</body></html>" >> ./direct-config/secrets-status.html
          
          # Lisätään linkki secrets-status.html-sivulle testisivulle
          if [ -f "./pages/test-contact-form.html" ]; then
            sed -i '/<button class="action-button" onclick="window.open/a \            <button class="action-button" onclick="window.open('\''../direct-config/secrets-status.html'\'', '\''_blank'\'')">\n                <i class="fas fa-key"></i> Tarkista GitHub Secrets\n            </button>' ./pages/test-contact-form.html
            echo "Linkki GitHub Secrets -statussivulle lisätty test-contact-form.html-sivulle"
          fi
          
      - name: Verify config files
        run: |
          echo "Verifying config.runtime.js exists in multiple locations"
          if [ -f "./config.runtime.js" ]; then
            echo "Root config file created successfully"
            ls -la ./config.runtime.js
          else
            echo "Root config file creation failed"
            exit 1
          fi
          
          if [ -f "./js/config.runtime.js" ]; then
            echo "JS directory config file created successfully"
          else
            echo "JS directory config file creation failed"
          fi
          
          if [ -f "./pages/config.runtime.js" ]; then
            echo "Pages directory config file created successfully"
          else
            echo "Pages directory config file creation failed"
          fi
          
          # Tarkistetaan erillinen supabase-config.js tiedosto
          if [ -f "./js/supabase-config.js" ]; then
            echo "Supabase config file created successfully"
            ls -la ./js/supabase-config.js
          else
            echo "Supabase config file creation failed"
          fi
          
          # Tarkistetaan suora konfiguraatiotiedosto
          if [ -f "./direct-config/config.js" ]; then
            echo "Direct config file created successfully"
            ls -la ./direct-config/config.js
            cat ./direct-config/config.js
          else
            echo "Direct config file creation failed"
          fi
          
          # Tarkistetaan suora konfiguraatiosivu
          if [ -f "./direct-config/index.html" ]; then
            echo "Direct config page created successfully"
            ls -la ./direct-config/index.html
          else
            echo "Direct config page creation failed"
          fi
          
          # Tarkistetaan GitHub Secrets -statussivu
          if [ -f "./direct-config/secrets-status.html" ]; then
            echo "GitHub Secrets status page created successfully"
            ls -la ./direct-config/secrets-status.html
          else
            echo "GitHub Secrets status page creation failed"
          fi
          
          # Tarkistetaan, että inline-konfiguraatio on lisätty
          if [ -f "./pages/yhteystiedot.html" ]; then
            if grep -q "window.INLINE_CONFIG" ./pages/yhteystiedot.html; then
              echo "Inline configuration added to yhteystiedot.html"
            else
              echo "Failed to add inline configuration to yhteystiedot.html"
            fi
          fi
          
          # Tarkistetaan, että inline-konfiguraatio on lisätty testisivulle
          if [ -f "./pages/test-contact-form.html" ]; then
            if grep -q "window.INLINE_CONFIG" ./pages/test-contact-form.html; then
              echo "Inline configuration added to test-contact-form.html"
              
              # Näytetään lisätietoja
              echo "Showing first few lines of test-contact-form.html:"
              head -n 20 ./pages/test-contact-form.html
            else
              echo "Failed to add inline configuration to test-contact-form.html"
            fi
            
            # Tarkistetaan, että erillisen konfiguraatiotiedoston lataus on lisätty
            if grep -q "supabase-config.js" ./pages/test-contact-form.html; then
              echo "Supabase config script tag added to test-contact-form.html"
            else
              echo "Failed to add supabase config script tag to test-contact-form.html"
            fi
            
            # Tarkistetaan, että suoran konfiguraatiotiedoston lataus on lisätty
            if grep -q "direct-config/config.js" ./pages/test-contact-form.html; then
              echo "Direct config script tag added to test-contact-form.html"
            else
              echo "Failed to add direct config script tag to test-contact-form.html"
            fi
            
            # Tarkistetaan, että GitHub Secrets -statussivun linkki on lisätty
            if grep -q "secrets-status.html" ./pages/test-contact-form.html; then
              echo "GitHub Secrets status page link added to test-contact-form.html"
            else
              echo "Failed to add GitHub Secrets status page link to test-contact-form.html"
            fi
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }} 