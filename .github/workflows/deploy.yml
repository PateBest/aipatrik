name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Check for GitHub Secrets
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "Error: SUPABASE_URL secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "Error: SUPABASE_ANON_KEY secret is missing."
            exit 1
          fi
          
          echo "GitHub Secrets found and validated."
          # Emme voi tulostaa secretien pituutta suoraan, koska ne eivät ole saatavilla shell-ympäristössä
          echo "Secrets are available and will be used in the next steps."

      - name: Create config.runtime.js
        run: |
          # Create js directory if it doesn't exist
          mkdir -p js
          
          # Create config.runtime.js with Supabase configuration
          cat > js/config.runtime.js << EOF
          // This file is generated during deployment - do not edit manually
          window.SUPABASE_URL = "${{ secrets.SUPABASE_URL }}";
          window.SUPABASE_ANON_KEY = "${{ secrets.SUPABASE_ANON_KEY }}";
          
          // Make configuration available through CONFIG object for compatibility
          if (typeof window.CONFIG === 'undefined') {
            window.CONFIG = {};
          }
          window.CONFIG.SUPABASE_URL = window.SUPABASE_URL;
          window.CONFIG.SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY;
          
          // Make configuration available through INLINE_CONFIG object for compatibility
          window.INLINE_CONFIG = {
            SUPABASE_URL: "${{ secrets.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}"
          };
          
          console.log("Supabase configuration loaded from config.runtime.js");
          EOF
          
          echo "Created config.runtime.js with Supabase configuration"
          
          # Create copies in multiple locations for better accessibility
          mkdir -p pages/js
          cp js/config.runtime.js pages/js/config.runtime.js
          echo "Created copy of config.runtime.js in pages/js directory"
          
          # Copy to root directory
          cp js/config.runtime.js ./config.runtime.js
          echo "Created copy of config.runtime.js in root directory"
          
          # Copy to pages directory
          cp js/config.runtime.js ./pages/config.runtime.js
          echo "Created copy of config.runtime.js in pages directory"

      - name: Replace Supabase config
        run: |
          # Replace placeholder in yhteystiedot.html with proper JavaScript object
          sed -i 's|// SUPABASE_CONFIG_PLACEHOLDER|window.SUPABASE_URL="${{ secrets.SUPABASE_URL }}"; window.SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"; window.INLINE_CONFIG = { SUPABASE_URL: "${{ secrets.SUPABASE_URL }}", SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}" }; console.log("Inline Supabase configuration loaded");|' pages/yhteystiedot.html

          # Create .nojekyll file to prevent GitHub Pages from using Jekyll
          touch .nojekyll
          echo "Created .nojekyll file"

      - name: Create direct configuration page
        run: |
          # Create a direct configuration page for easy debugging
          mkdir -p debug
          cat > debug/config-status.html << EOF
          <!DOCTYPE html>
          <html lang="fi">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Supabase Configuration Status</title>
              <style>
                  body { font-family: Arial, sans-serif; background-color: #121212; color: #e0e0e0; padding: 20px; }
                  .container { max-width: 800px; margin: 0 auto; background-color: #1e1e1e; padding: 20px; border-radius: 8px; }
                  h1 { color: #00e6b8; }
                  .status-box { background-color: #2a2a2a; padding: 15px; border-radius: 5px; margin: 15px 0; }
                  .success { color: #00e6b8; }
                  .error { color: #ff5555; }
                  pre { background-color: #2a2a2a; padding: 10px; border-radius: 5px; overflow-x: auto; }
                  .back-link { color: #00e6b8; text-decoration: none; display: inline-block; margin-top: 20px; }
                  .back-link:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>Supabase Configuration Status</h1>
                  
                  <div class="status-box">
                      <h2>Configuration Check</h2>
                      <p>This page checks if Supabase configuration is properly loaded.</p>
                      <p>If you see "Configuration is missing" below, it means the GitHub Secrets are not properly set up or the configuration is not being loaded correctly.</p>
                  </div>
                  
                  <div class="status-box">
                      <h2>Window Object Check</h2>
                      <div id="window-status">Checking...</div>
                  </div>
                  
                  <div class="status-box">
                      <h2>CONFIG Object Check</h2>
                      <div id="config-status">Checking...</div>
                  </div>
                  
                  <div class="status-box">
                      <h2>INLINE_CONFIG Object Check</h2>
                      <div id="inline-config-status">Checking...</div>
                  </div>
                  
                  <a href="../pages/yhteystiedot.html" class="back-link">← Back to Contact Form</a>
              </div>
              
              <script>
                  // Load config.runtime.js dynamically
                  const script = document.createElement('script');
                  script.src = '../js/config.runtime.js';
                  document.head.appendChild(script);
                  
                  // Check configuration after a short delay
                  setTimeout(() => {
                      // Check window object
                      const windowStatus = document.getElementById('window-status');
                      if (window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
                          windowStatus.innerHTML = '<span class="success">✓ Window object contains Supabase configuration</span>';
                      } else {
                          windowStatus.innerHTML = '<span class="error">✗ Window object is missing Supabase configuration</span>';
                      }
                      
                      // Check CONFIG object
                      const configStatus = document.getElementById('config-status');
                      if (window.CONFIG && window.CONFIG.SUPABASE_URL && window.CONFIG.SUPABASE_ANON_KEY) {
                          configStatus.innerHTML = '<span class="success">✓ CONFIG object contains Supabase configuration</span>';
                      } else {
                          configStatus.innerHTML = '<span class="error">✗ CONFIG object is missing Supabase configuration</span>';
                      }
                      
                      // Check INLINE_CONFIG object
                      const inlineConfigStatus = document.getElementById('inline-config-status');
                      if (window.INLINE_CONFIG && window.INLINE_CONFIG.SUPABASE_URL && window.INLINE_CONFIG.SUPABASE_ANON_KEY) {
                          inlineConfigStatus.innerHTML = '<span class="success">✓ INLINE_CONFIG object contains Supabase configuration</span>';
                      } else {
                          inlineConfigStatus.innerHTML = '<span class="error">✗ INLINE_CONFIG object is missing Supabase configuration</span>';
                      }
                  }, 500);
              </script>
          </body>
          </html>
          EOF
          
          echo "Created debug/config-status.html for configuration debugging"

      - name: Verify changes
        run: |
          # Verify config.runtime.js exists and contains Supabase configuration
          if [ -f "./js/config.runtime.js" ]; then
            if grep -q "window.SUPABASE_URL" ./js/config.runtime.js; then
              echo "Supabase config successfully added to config.runtime.js"
            else
              echo "Failed to add Supabase config to config.runtime.js"
              exit 1
            fi
          else
            echo "config.runtime.js not found"
            exit 1
          fi
          
          # Verify yhteystiedot.html
          if grep -q "window.SUPABASE_URL" ./pages/yhteystiedot.html; then
            echo "Supabase config successfully added to yhteystiedot.html"
          else
            echo "Failed to add Supabase config to yhteystiedot.html"
            exit 1
          fi
          
          # Verify root config.runtime.js
          if [ -f "./config.runtime.js" ]; then
            echo "Root config.runtime.js exists"
          else
            echo "Root config.runtime.js not found"
            exit 1
          fi
          
          # Verify pages/config.runtime.js
          if [ -f "./pages/config.runtime.js" ]; then
            echo "Pages config.runtime.js exists"
          else
            echo "Pages config.runtime.js not found"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: .
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }} 